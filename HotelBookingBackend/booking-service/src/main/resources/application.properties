spring.application.name=booking-service
server.port=8090

spring.profiles.active=dev

spring.datasource.url=jdbc:mysql://localhost:3306/booking_db?createDatabaseIfNotExist=true
spring.datasource.username=${replace it with your actual db username}
spring.datasource.password=${replace it with your actual db password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

jwt.secret=${replace it with your actual jwt token}
jwt.expirationMs=86400000

# Feign Client Timeouts & Circuit Breaker
spring.cloud.openfeign.circuitbreaker.enabled=false
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=3000

# Resilience4J Circuit Breaker configuration
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.userService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.userService.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=50

resilience4j.circuitbreaker.instances.hotelService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.hotelService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.hotelService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.hotelService.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.hotelService.failureRateThreshold=50

# Resilience4J Retry configuration
resilience4j.retry.instances.userService.maxAttempts=3
resilience4j.retry.instances.userService.waitDuration=2s
resilience4j.retry.instances.hotelService.maxAttempts=3
resilience4j.retry.instances.hotelService.waitDuration=2s

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
