spring.application.name=user-service
server.port=8088

spring.profiles.active = dev

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true
spring.datasource.username=${replace with db username}
spring.datasource.password=${replace it with actual db password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

jwt.secret=${replace with actual jwt token}

# Feign Client Timeouts & Circuit Breaker
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=3000

# Resilience4J Circuit Breaker configuration
resilience4j.circuitbreaker.instances.authService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.authService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.authService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.authService.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.authService.failureRateThreshold=50

# Resilience4J Retry configuration
resilience4j.retry.instances.authService.maxAttempts=3
resilience4j.retry.instances.authService.waitDuration=2s

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method

