spring.application.name=api-gateway
server.port=8081

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.mvc.routes[0].id=hotel-service
spring.cloud.gateway.mvc.routes[0].uri=lb://HOTEL-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/hotel/**

spring.cloud.gateway.mvc.routes[1].id=auth-service
spring.cloud.gateway.mvc.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/auth/**,/login/oauth2/**

spring.cloud.gateway.mvc.routes[2].id=user-service
spring.cloud.gateway.mvc.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/users/**

spring.cloud.gateway.mvc.routes[3].id=booking-service
spring.cloud.gateway.mvc.routes[3].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/bookings,/bookings/**

jwt.secret =7a9f3c2e8b1d4f6a0e5c8b2d7f1a4e9c3b6d0f5a8e2c7b4d1f6a3e0c9b5d8f2a

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method